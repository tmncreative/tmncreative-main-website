<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | TMN Creative</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#fff;color:#1E293B;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
    .wrap{text-align:center;max-width:420px;opacity:0;animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s forwards}
    .logo{height:28px;margin-bottom:2.5rem;opacity:0.6}
    .code{font-size:5rem;font-weight:800;letter-spacing:-0.04em;color:#E2E8F0;line-height:1;margin-bottom:1rem}
    h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.5rem;color:#0F172A}
    p{font-size:0.9rem;color:#64748B;line-height:1.7;margin-bottom:2rem}
    .back{font-size:0.8rem;font-weight:600;color:#fff;background:#0F172A;padding:0.8rem 2rem;text-decoration:none;display:inline-block;border-radius:8px;transition:all 0.25s cubic-bezier(0.16,1,0.3,1)}
    .back:hover{background:#1E293B;transform:translateY(-2px);box-shadow:0 8px 25px rgba(15,23,42,0.15)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="wrap">
    <img src="images/logo-dark.png" alt="TMN Creative" class="logo" />
    <div class="code">404</div>
    <h1>Page not found.</h1>
    <p>This page does not exist or may have moved. Head back to the homepage or get in touch if you need help finding something.</p>
    <a href="/" class="back">Back to TMN Creative</a>
  </div>
</body>
</html>
