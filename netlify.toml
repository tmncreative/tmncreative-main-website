[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/pay"
  to = "/pay.html"
  status = 200

[[redirects]]
  from = "/care"
  to = "/care.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
