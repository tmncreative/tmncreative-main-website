[build]
  publish = "."

# Netlify pretty URLs are enabled by default
# /portfolio serves portfolio.html automatically
# /websites-for-contractors serves websites-for-contractors.html automatically

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Custom 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
