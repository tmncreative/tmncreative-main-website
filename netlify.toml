[build]
  publish = "."
  functions = "netlify/functions"

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"

# Images — long-term cache, immutable
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — no cache so edits propagate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Lightweight attribution helper — short cache so tracking changes propagate
[[headers]]
  for = "/tmn-attribution*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/javascript; charset=utf-8"

# Noindex utility and retired draft surfaces even if a bot reaches them directly
[[headers]]
  for = "/success"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/pay"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/new%20landing%20stuff/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Sitemap and robots — short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# llms.txt — AI search engine guide. Serve as text/plain so AI crawlers parse it.
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"
